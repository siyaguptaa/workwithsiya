<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Siya Gupta — SiyaOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
<style>
/* ============================================================
   TOKENS
============================================================ */
:root{
  --pink:#ffd6e8;
  --pink-deep:#ff9ec6;
  --peach:#ffe3c2;
  --lavender:#dcd2ff;
  --lavender-deep:#b9a8ff;
  --ink:#3a2e4d;
  --ink-soft:#6b5b85;
  --cream:#fff8ef;
  --paper:#fffdf6;
  --note-yellow:#fff3a3;
  --window-bar:#f4ecff;
  --accent:#ff6fa0;
  --accent-2:#7ad0c4;
  --shadow-pix:#2a2138;
  --border:3px solid var(--ink);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Press Start 2P',monospace;
  background:#000;
  overflow:hidden;
  image-rendering:pixelated;
  color:var(--ink);
  cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28"><g fill="%233a2e4d"><rect x="4" y="2" width="2" height="2"/><rect x="4" y="4" width="2" height="2"/><rect x="6" y="4" width="2" height="2"/><rect x="4" y="6" width="2" height="2"/><rect x="6" y="6" width="2" height="2"/><rect x="8" y="6" width="2" height="2"/><rect x="4" y="8" width="2" height="2"/><rect x="6" y="8" width="2" height="2"/><rect x="8" y="8" width="2" height="2"/><rect x="10" y="8" width="2" height="2"/><rect x="4" y="10" width="2" height="2"/><rect x="6" y="10" width="2" height="2"/><rect x="8" y="10" width="2" height="2"/><rect x="10" y="10" width="2" height="2"/><rect x="12" y="10" width="2" height="2"/><rect x="4" y="12" width="2" height="2"/><rect x="6" y="12" width="2" height="2"/><rect x="8" y="12" width="2" height="2"/><rect x="6" y="14" width="2" height="2"/><rect x="8" y="14" width="2" height="2"/><rect x="10" y="14" width="2" height="2"/><rect x="8" y="16" width="2" height="2"/><rect x="10" y="16" width="2" height="2"/></g><g fill="%23ff6fa0"><rect x="6" y="2" width="2" height="10"/><rect x="8" y="4" width="2" height="2"/></g></svg>') 4 2, auto;
}
img{display:block;max-width:100%;image-rendering:pixelated;}
button{font-family:'Press Start 2P',monospace;cursor:inherit;}
::selection{background:var(--accent);color:#fff;}

/* pixelated scrollbars */
::-webkit-scrollbar{width:14px;height:14px;}
::-webkit-scrollbar-track{background:var(--cream);border-left:3px solid var(--ink);}
::-webkit-scrollbar-thumb{background:var(--lavender-deep);border:3px solid var(--ink);}
::-webkit-scrollbar-thumb:hover{background:var(--pink-deep);}

.pixel-border{
  border:var(--border);
  box-shadow:4px 4px 0 var(--shadow-pix);
}

/* ============================================================
   BOOT SCREEN
============================================================ */
#boot{
  position:fixed;inset:0;z-index:9999;
  background:#1b1530;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity .6s ease, visibility .6s ease;
}
#boot.hide{opacity:0;visibility:hidden;pointer-events:none;}
.boot-logo{
  font-size:clamp(18px,4vw,30px);
  color:#fff3a3;
  letter-spacing:2px;
  text-shadow:4px 4px 0 #ff6fa0;
  animation:bootPulse 1.2s steps(2) infinite;
}
@keyframes bootPulse{0%,100%{opacity:1}50%{opacity:.55}}
.boot-sub{font-size:9px;color:#b9a8ff;letter-spacing:1px;}
.boot-bar-wrap{width:280px;height:22px;border:3px solid #fff3a3;background:#2a2148;padding:3px;}
.boot-bar{height:100%;width:0%;background:repeating-linear-gradient(90deg,#ff9ec6 0 8px,#ff6fa0 8px 16px);animation:bootFill 2.6s steps(20) forwards;}
@keyframes bootFill{to{width:100%;}}
.boot-pct{font-size:9px;color:#fff;}
.boot-heart{width:16px;height:16px;display:inline-block;}

/* ============================================================
   DESKTOP / BACKGROUND
============================================================ */
#desktop{
  position:relative;
  width:100%;height:100%;
  overflow:hidden;
  background:linear-gradient(160deg,var(--pink) 0%, var(--peach) 48%, var(--lavender) 100%);
}

/* clouds */
.cloud{
  position:absolute;
  background:#fff;
  opacity:.85;
  filter:drop-shadow(3px 3px 0 rgba(255,255,255,.5));
}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;}
.cloud-1{width:90px;height:28px;top:8%;left:-120px;border-radius:2px;animation:driftRight 38s linear infinite;}
.cloud-1::before{width:36px;height:36px;top:-18px;left:14px;border-radius:2px;}
.cloud-1::after{width:26px;height:26px;top:-12px;left:48px;border-radius:2px;}
.cloud-2{width:60px;height:20px;top:18%;left:-90px;border-radius:2px;animation:driftRight 52s linear infinite;animation-delay:-12s;opacity:.7;}
.cloud-2::before{width:24px;height:24px;top:-12px;left:8px;}
.cloud-2::after{width:18px;height:18px;top:-8px;left:32px;}
.cloud-3{width:110px;height:30px;top:6%;right:-140px;border-radius:2px;animation:driftLeft 46s linear infinite;animation-delay:-6s;}
.cloud-3::before{width:40px;height:40px;top:-20px;left:18px;}
.cloud-3::after{width:30px;height:30px;top:-14px;left:58px;}
.cloud-4{width:50px;height:16px;top:30%;right:-80px;border-radius:2px;animation:driftLeft 60s linear infinite;animation-delay:-20s;opacity:.6;}
.cloud-4::before{width:20px;height:20px;top:-10px;left:6px;}
.cloud-4::after{width:14px;height:14px;top:-6px;left:26px;}
@keyframes driftRight{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 200px))}}
@keyframes driftLeft{from{transform:translateX(0)}to{transform:translateX(calc(-100vw - 200px))}}

/* ============================================================
   MENU BAR
============================================================ */
#menubar{
  position:absolute;top:0;left:0;right:0;height:38px;z-index:500;
  background:var(--cream);
  border-bottom:3px solid var(--ink);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;
  font-size:9px;
}
.menu-left{display:flex;align-items:center;gap:18px;}
.menu-logo{width:14px;height:14px;background:var(--accent);border:2px solid var(--ink);display:inline-block;position:relative;}
.menu-logo::after{content:'';position:absolute;top:3px;left:3px;width:4px;height:4px;background:#fff;}
.menu-name{letter-spacing:1px;}
.menu-items{display:flex;gap:16px;color:var(--ink-soft);}
.menu-items span{cursor:pointer;}
.menu-items span:hover{color:var(--accent);}
.menu-right{display:flex;align-items:center;gap:14px;color:var(--ink-soft);}
#clock{color:var(--ink);}
@media (max-width:680px){.menu-items{display:none;}}

/* ============================================================
   STICKY NOTE
============================================================ */
#sticky{
  position:absolute;top:64px;right:36px;width:180px;
  background:var(--note-yellow);
  border:3px solid var(--ink);
  box-shadow:5px 5px 0 var(--shadow-pix);
  padding:14px 12px 18px;
  transform:rotate(4deg);
  font-size:9px;line-height:1.9;
  z-index:50;
  animation:noteSway 5s ease-in-out infinite;
}
#sticky::before{
  content:'';position:absolute;top:-10px;left:50%;transform:translateX(-50%);
  width:16px;height:16px;background:#ff8aa8;border:2px solid var(--ink);border-radius:50%;
}
@keyframes noteSway{0%,100%{transform:rotate(4deg)}50%{transform:rotate(2deg)}}
@media (max-width:680px){#sticky{top:48px;right:10px;width:130px;font-size:8px;}}

@keyframes girlBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-6px)}}
.girl-speech{
  position:absolute;top:-46px;left:50%;transform:translateX(-50%);
  background:#fff;border:2px solid var(--ink);padding:5px 8px;font-size:7px;
  white-space:nowrap;box-shadow:3px 3px 0 var(--shadow-pix);
  opacity:0;animation:speechPop 8s ease-in-out infinite;
}
@keyframes speechPop{0%,8%{opacity:0;transform:translateX(-50%) translateY(6px)}12%,28%{opacity:1;transform:translateX(-50%) translateY(0)}34%,100%{opacity:0;}}

/* ============================================================
   DESKTOP ICONS
============================================================ */
#icons{
  position:absolute;top:56px;left:18px;z-index:40;
  display:grid;
  grid-template-rows:repeat(5,84px);
  grid-auto-flow:column;
  gap:6px;
}
.icon{
  width:78px;height:78px;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  gap:6px;padding:6px 2px;
  cursor:pointer;
  user-select:none;
  -webkit-user-select:none;
}
.icon-glyph{
  width:40px;height:40px;
  background:var(--paper);
  border:3px solid var(--ink);
  box-shadow:3px 3px 0 var(--shadow-pix);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  transition:transform .1s;
}
.icon:hover .icon-glyph{transform:translateY(-3px);}
.icon:active .icon-glyph{transform:translateY(0px);box-shadow:1px 1px 0 var(--shadow-pix);}
.icon-label{
  font-size:7px;text-align:center;line-height:1.5;color:var(--ink);
  background:rgba(255,255,255,.55);
  padding:2px 3px;
  max-width:76px;
}
.icon.selected .icon-label{background:var(--accent);color:#fff;}

/* trash can */
#trash{
  position:absolute;bottom:104px;right:22px;z-index:60;
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;
}
#trash .icon-glyph{width:46px;height:46px;font-size:24px;background:#ffeef5;}
#trash:hover .icon-glyph{transform:translateY(-3px) rotate(-4deg);}
@media (max-width:680px){#icons{grid-template-rows:repeat(7,76px);}}

/* ============================================================
   DOCK
============================================================ */
#dock{
  position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  z-index:200;
  display:flex;align-items:flex-end;gap:10px;
  background:rgba(255,255,255,.55);
  border:3px solid var(--ink);
  box-shadow:4px 4px 0 var(--shadow-pix);
  padding:8px 12px;
}
.dock-item{
  width:42px;height:42px;
  background:var(--paper);
  border:2px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  cursor:pointer;
  transition:transform .15s ease;
}
.dock-item:hover{transform:translateY(-8px) scale(1.08);}
.dock-sep{width:2px;align-self:stretch;background:var(--ink);opacity:.25;margin:0 2px;}
@media (max-width:680px){.dock-item{width:34px;height:34px;font-size:16px;}#dock{gap:6px;padding:6px 8px;}}

/* ============================================================
   WINDOWS
============================================================ */
.window{
  position:absolute;
  min-width:300px;
  max-width:min(640px,92vw);
  background:var(--window-bar);
  border:3px solid var(--ink);
  box-shadow:6px 6px 0 var(--shadow-pix);
  z-index:100;
  display:flex;flex-direction:column;
  animation:winOpen .18s steps(4) both;
}
@keyframes winOpen{from{transform:scale(.85);opacity:0;}to{transform:scale(1);opacity:1;}}
.window.closing{animation:winClose .15s steps(4) both;}
@keyframes winClose{to{transform:scale(.85);opacity:0;}}
.window.maximized{
  top:46px !important;left:2vw !important;
  width:96vw !important;max-width:96vw !important;
  height:calc(100vh - 110px) !important;
}
.titlebar{
  background:linear-gradient(180deg,#ffe8f4,#ffd2ea);
  border-bottom:3px solid var(--ink);
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;
  cursor:grab;
  user-select:none;
}
.titlebar:active{cursor:grabbing;}
.tl-btn{width:13px;height:13px;border:2px solid var(--ink);cursor:pointer;flex-shrink:0;}
.tl-red{background:#ff6b6b;}
.tl-yellow{background:#ffd866;}
.tl-green{background:#8ee6a1;}
.titlebar-title{font-size:9px;flex:1;text-align:center;letter-spacing:.5px;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.window-body{
  padding:18px 18px 22px;
  overflow-y:auto;
  background:var(--paper);
  font-size:10px;line-height:1.9;
  color:var(--ink);
  max-height:60vh;
}
.window.maximized .window-body{max-height:none;flex:1;}
.window-body h2{font-size:13px;margin-bottom:10px;color:var(--ink);line-height:1.6;}
.window-body h3{font-size:10px;margin:14px 0 6px;color:var(--accent);}
.window-body p{margin-bottom:12px;}
.window-body .tagrow{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.win-tag{font-size:7px;background:var(--lavender);border:2px solid var(--ink);padding:4px 7px;}
.shot{border:3px solid var(--ink);box-shadow:3px 3px 0 var(--shadow-pix);margin-bottom:12px;overflow:hidden;}
.shot img{width:100%;height:auto;display:block;}
.shot-cap{font-size:7px;background:var(--ink);color:#fff;padding:5px 7px;letter-spacing:.5px;}
.shotgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media (max-width:520px){.shotgrid{grid-template-columns:1fr;}}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0;}
.stat-box{flex:1;min-width:90px;background:var(--lavender);border:2px solid var(--ink);padding:10px;text-align:center;}
.stat-num{font-size:14px;color:var(--accent);}
.stat-lbl{font-size:6px;margin-top:6px;color:var(--ink-soft);}
.btn-pixel{
  display:inline-block;margin-top:8px;
  background:var(--accent);color:#fff;border:2px solid var(--ink);
  padding:9px 14px;font-size:8px;cursor:pointer;box-shadow:3px 3px 0 var(--shadow-pix);
  text-decoration:none;
}
.btn-pixel:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--shadow-pix);}
.skill-cat{margin-bottom:14px;}
.skill-list{list-style:none;}

/* ============================================================
   AUDIO — tiny 8-bit beeps via WebAudio (no files needed)
============================================================ */
let actx;
function ac(){ if(!actx){ actx = new (window.AudioContext||window.webkitAudioContext)(); } return actx; }
function beep(freq, dur, type, vol){
  try{
    const ctx = ac();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.value = freq;
    gain.gain.value = (vol||0.06);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.stop(ctx.currentTime + dur);
  }catch(e){}
}
function sfxOpen(){ beep(520,.07,'square'); setTimeout(()=>beep(780,.08,'square'),60); }
function sfxClose(){ beep(420,.07,'square'); setTimeout(()=>beep(260,.09,'square'),50); }

  h = h%12; if(h===0) h=12;

/* ============================================================
   WINDOW MANAGER
============================================================ */
const layer = document.getElementById('windows-layer');
let zCounter = 100;
const openWindows = {};
let cascade = 0;

function openWindow(id){
  if(openWindows[id]){
    focusWindow(openWindows[id]);
    return;
  }
  const data = WIN[id];
  const win = document.createElement('div');
  win.className = 'window';
  win.style.width = (data.w||460)+'px';
  const baseLeft = Math.min(160 + (cascade%6)*30, window.innerWidth - (data.w||460) - 30);
  const baseTop = Math.min(70 + (cascade%6)*26, window.innerHeight - 240);
  win.style.left = Math.max(20,baseLeft) + 'px';
  win.style.top = Math.max(50,baseTop) + 'px';
  cascade++;

  win.innerHTML = `
    <div class="titlebar">
      <div class="tl-btn tl-red" data-act="close"></div>
      <div class="tl-btn tl-yellow" data-act="min"></div>
      <div class="tl-btn tl-green" data-act="max"></div>
      <div class="titlebar-title">${data.icon} ${data.title}</div>
    </div>
    <div class="window-body">${data.body}</div>
  `;
  layer.appendChild(win);
  openWindows[id] = win;
  focusWindow(win);
  sfxOpen();

  // traffic light buttons
  win.querySelector('[data-act="close"]').addEventListener('click', (e)=>{ e.stopPropagation(); closeWindow(id); });
  win.querySelector('[data-act="min"]').addEventListener('click', (e)=>{ e.stopPropagation(); win.style.display='none'; sfxClick(); });
  win.querySelector('[data-act="max"]').addEventListener('click', (e)=>{ e.stopPropagation(); win.classList.toggle('maximized'); sfxClick(); });

  // focus + drag
  win.addEventListener('mousedown', ()=>focusWindow(win));
  win.addEventListener('touchstart', ()=>focusWindow(win));
  makeDraggable(win, win.querySelector('.titlebar'));
}

function closeWindow(id){
  const win = openWindows[id];
  if(!win) return;
  win.classList.add('closing');
  sfxClose();
  setTimeout(()=>{ win.remove(); delete openWindows[id]; }, 160);
}

function focusWindow(win){
  zCounter++;
  win.style.zIndex = zCounter;
  if(win.style.display==='none') win.style.display='flex';
}

function makeDraggable(win, handle){
  let dragging=false, sx=0, sy=0, ox=0, oy=0;
  function start(e){
    if(win.classList.contains('maximized')) return;
    dragging=true;
    const pt = e.touches?e.touches[0]:e;
    sx=pt.clientX; sy=pt.clientY;
    const rect = win.getBoundingClientRect();
    ox=rect.left; oy=rect.top;
    focusWindow(win);
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', stop);
    document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('touchend', stop);
  }
  function move(e){
    if(!dragging) return;
    if(e.touches) e.preventDefault();
    const pt = e.touches?e.touches[0]:e;
    const dx = pt.clientX - sx, dy = pt.clientY - sy;
    let nl = ox+dx, nt = Math.max(40, oy+dy);
    win.style.left = nl+'px';
    win.style.top = nt+'px';
  }
  function stop(){
    dragging=false;
    document.removeEventListener('mousemove', move);
    document.removeEventListener('mouseup', stop);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('touchend', stop);
  }
  handle.addEventListener('mousedown', start);
  handle.addEventListener('touchstart', start, {passive:true});
}
